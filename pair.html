<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALI-MD SESSION</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --navy-dark: #020412;
        --navy-light: #0a0e29;
        --neon-red: #ff003c;
        --neon-red-dim: rgba(255, 0, 60, 0.2);
        --neon-red-glow: rgba(255, 0, 60, 0.6);
        --text-main: #e0e4ff;
        --success-color: #00ffaa;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Share Tech Mono', monospace;
        font-weight: bold;
        background-color: var(--navy-dark);
        /* Animated Cyber Grid Background */
        background-image: 
          radial-gradient(circle at center, var(--navy-light) 0%, transparent 70%),
          linear-gradient(var(--neon-red-dim) 1px, transparent 1px),
          linear-gradient(90deg, var(--neon-red-dim) 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        background-position: center, 0 0, 0 0;
        animation: cyberGrid 3s linear infinite;
        color: var(--text-main);
        min-height: 100vh;
        /* Fixed scrolling: Allow vertical scroll, hide horizontal */
        overflow-y: auto; 
        overflow-x: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 15px; /* Added padding to ensure space for scrolling */
      }

      @keyframes cyberGrid {
        0% { background-position: center, 0 0, 0 0; }
        100% { background-position: center, 40px 40px, 40px 40px; }
      }

      /* Global Moving Scanline */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 10vh;
        background: linear-gradient(to bottom, transparent, var(--neon-red-dim), transparent);
        opacity: 0.5;
        animation: scanline 6s linear infinite;
        pointer-events: none;
        z-index: 999;
      }

      @keyframes scanline {
        0% { top: -10vh; }
        100% { top: 110vh; }
      }

      /* Floating Cyber Container */
      .container {
        width: 100%;
        max-width: 450px;
        background: rgba(2, 4, 18, 0.9);
        border: 2px solid var(--neon-red);
        border-radius: 8px;
        padding: 35px;
        position: relative;
        backdrop-filter: blur(10px);
        /* Full container floating animation */
        animation: floatContainer 4s ease-in-out infinite;
        margin: auto;
      }

      @keyframes floatContainer {
        0% { 
          transform: translateY(0px); 
          box-shadow: 0 0 15px var(--neon-red-glow), inset 0 0 15px rgba(10, 14, 41, 0.8); 
        }
        50% { 
          transform: translateY(-12px); 
          box-shadow: 0 15px 30px var(--neon-red), inset 0 0 25px rgba(255, 0, 60, 0.2); 
        }
        100% { 
          transform: translateY(0px); 
          box-shadow: 0 0 15px var(--neon-red-glow), inset 0 0 15px rgba(10, 14, 41, 0.8); 
        }
      }

      .header {
        text-align: center;
        margin-bottom: 25px;
      }

      .logo {
        width: 70px;
        height: 70px;
        margin: 0 auto 15px;
        background: transparent;
        border: 2px solid var(--neon-red);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        color: var(--neon-red);
        animation: rotateGlow 3s linear infinite;
      }

      @keyframes rotateGlow {
        0% { box-shadow: 0 0 10px var(--neon-red); transform: rotate(0deg) scale(1); }
        50% { box-shadow: 0 0 30px var(--neon-red), inset 0 0 15px var(--neon-red); transform: rotate(180deg) scale(1.05); }
        100% { box-shadow: 0 0 10px var(--neon-red); transform: rotate(360deg) scale(1); }
      }

      .logo i {
        animation: counterRotate 3s linear infinite;
      }

      @keyframes counterRotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }

      /* Neon Text with Flicker */
      .title {
        font-family: 'Orbitron', sans-serif;
        font-size: 26px;
        font-weight: 900;
        margin-bottom: 5px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
        animation: neonFlicker 2s infinite alternate;
      }

      @keyframes neonFlicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
          text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-red), 0 0 40px var(--neon-red);
        }
        20%, 24%, 55% {
          text-shadow: none;
        }
      }

      .subtitle {
        font-size: 14px;
        font-weight: bold;
        color: var(--neon-red);
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        animation: pulseText 2s ease-in-out infinite;
      }

      @keyframes pulseText {
        0%, 100% { opacity: 1; text-shadow: 0 0 5px var(--neon-red-glow); }
        50% { opacity: 0.6; text-shadow: none; }
      }

      /* Toggle Switch */
      .toggle-container {
        display: flex;
        border: 2px solid var(--neon-red);
        border-radius: 4px;
        margin-bottom: 25px;
        overflow: hidden;
      }

      .toggle-option {
        flex: 1;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        font-family: 'Orbitron', sans-serif;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--neon-red);
        transition: 0.3s;
        letter-spacing: 1px;
      }

      .toggle-option.active {
        background: var(--neon-red);
        color: var(--navy-dark);
        box-shadow: 0 0 15px var(--neon-red);
        animation: activePulse 2s infinite;
      }

      @keyframes activePulse {
        0%, 100% { box-shadow: 0 0 10px var(--neon-red); }
        50% { box-shadow: 0 0 20px var(--neon-red); }
      }

      .toggle-option:not(.active):hover {
        background: rgba(255, 0, 60, 0.2);
      }

      /* Inputs */
      .input-group {
        margin-bottom: 25px;
      }

      .input-group.hidden {
        display: none;
      }

      .input-label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: bold;
        text-transform: uppercase;
        color: var(--neon-red);
        letter-spacing: 1px;
      }

      .input-field {
        width: 100%;
        padding: 15px;
        background: rgba(255, 0, 60, 0.05);
        border: 1px solid rgba(255, 0, 60, 0.3);
        border-bottom: 3px solid var(--neon-red);
        color: #fff;
        font-family: 'Share Tech Mono', monospace;
        font-weight: bold;
        font-size: 16px;
        transition: 0.3s;
        outline: none;
      }

      .input-field:focus {
        border-color: var(--neon-red);
        box-shadow: 0 10px 20px -10px var(--neon-red), inset 0 0 10px var(--neon-red-dim);
        background: rgba(255, 0, 60, 0.1);
        transform: scale(1.02);
      }

      /* Animated Buttons */
      .generate-btn, .copy-btn {
        width: 100%;
        padding: 15px;
        background: transparent;
        border: 2px solid var(--neon-red);
        color: var(--neon-red);
        font-family: 'Orbitron', sans-serif;
        font-size: 15px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
        text-shadow: 0 0 5px var(--neon-red);
      }

      .generate-btn:hover, .copy-btn:hover {
        background: var(--neon-red);
        color: var(--navy-dark);
        box-shadow: 0 0 25px var(--neon-red);
        text-shadow: none;
        transform: translateY(-2px);
      }

      /* Button Hover Scan Effect */
      .generate-btn::before, .copy-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        transition: 0.5s;
      }

      .generate-btn:hover::before, .copy-btn:hover::before {
        left: 100%;
        transition: 0.5s;
      }

      .generate-btn.hidden {
        display: none;
      }

      .copy-btn {
        margin-top: 20px;
      }

      /* Display Areas */
      .code-display {
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid var(--neon-red);
        padding: 20px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 20px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--success-color);
        text-shadow: 0 0 10px var(--success-color);
        box-shadow: inset 0 0 20px rgba(0, 255, 170, 0.1);
        animation: pulseBorder 2s infinite alternate;
      }

      @keyframes pulseBorder {
        0% { border-color: var(--neon-red-dim); }
        100% { border-color: var(--neon-red); }
      }

      .qr-display {
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid var(--neon-red);
        padding: 25px;
        text-align: center;
        margin-bottom: 20px;
        display: none;
        animation: pulseBorder 2s infinite alternate;
      }

      .qr-image {
        max-width: 250px;
        max-height: 250px;
        margin: 0 auto 15px;
        border: 2px solid var(--neon-red);
        box-shadow: 0 0 20px var(--neon-red-glow);
        background: white;
        padding: 10px;
        animation: floatContainer 4s ease-in-out infinite reverse;
      }

      .qr-instructions {
        font-size: 13px;
        font-weight: bold;
        color: var(--text-main);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .success-message {
        color: var(--success-color);
        display: flex;
        align-items: center;
        gap: 10px;
        animation: neonFlicker 3s infinite alternate;
      }

      .error-message {
        color: var(--neon-red);
        display: flex;
        align-items: center;
        gap: 10px;
        text-shadow: 0 0 10px var(--neon-red);
      }

      .loading {
        display: none;
        text-align: center;
        margin: 20px 0;
      }

      .loading i {
        font-size: 32px;
        color: var(--neon-red);
        animation: spin 1s linear infinite;
        text-shadow: 0 0 15px var(--neon-red);
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .footer {
        text-align: center;
        margin-top: 25px;
        font-size: 11px;
        font-weight: bold;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 2px;
        border-top: 2px dashed var(--neon-red-dim);
        padding-top: 15px;
      }

      @media (max-width: 480px) {
        body { padding: 20px 10px; }
        .container { padding: 25px; border-width: 1px; }
        .title { font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo"><i class="fas fa-robot"></i></div>
        <h1 class="title">ALI-MD</h1>
        <p class="subtitle">System Authorization</p>
      </div>

      <div class="toggle-container">
        <div class="toggle-option active" data-mode="pair">
          <i class="fas fa-terminal"></i> Pair Code
        </div>
        <div class="toggle-option" data-mode="qr">
          <i class="fas fa-qrcode"></i> Scan QR
        </div>
      </div>

      <div class="input-group" id="inputGroup">
        <label class="input-label">> Target_Number</label>
        <input
          type="text"
          id="mobileNumber"
          class="input-field"
          placeholder="+92XXXXXXXXXX"
          pattern="[+][0-9]{10,}"
          title="Enter country code starting with + followed by number"
        />
      </div>

      <button class="generate-btn" id="submit">
        <i class="fas fa-bolt"></i> Execute Pairing
      </button>

      <div class="loading" id="loading">
        <i class="fas fa-circle-notch"></i>
      </div>

      <div class="code-display" id="codeDisplay">
        AWAITING_INPUT...
      </div>

      <div class="qr-display" id="qrDisplay">
        <img id="qrImage" class="qr-image" src="" alt="QR Code" />
        <div class="qr-instructions" id="qrInstructions">
          INITIALIZING SCANNER...
        </div>
      </div>

      <button class="copy-btn" id="copy" onclick="copyCode()">
        <i class="far fa-copy"></i> Extract Code
      </button>

      <div class="footer">
        <p>SYS_VER_2026 // ALI-MD</p>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
    <script>
      let currentMode = "pair";

      // Toggle functionality
      document.querySelectorAll(".toggle-option").forEach((option) => {
        option.addEventListener("click", function () {
          const mode = this.dataset.mode;
          if (mode === currentMode) return;

          // Update active state
          document
            .querySelectorAll(".toggle-option")
            .forEach((opt) => opt.classList.remove("active"));
          this.classList.add("active");

          // Update mode
          currentMode = mode;

          // Update button and input visibility
          const submitBtn = document.getElementById("submit");
          const inputGroup = document.getElementById("inputGroup");

          if (mode === "pair") {
            submitBtn.innerHTML = '<i class="fas fa-bolt"></i> Execute Pairing';
            submitBtn.classList.remove("hidden");
            inputGroup.classList.remove("hidden");
          } else {
            submitBtn.classList.add("hidden");
            inputGroup.classList.add("hidden");
            // Auto-generate QR code when QR mode is selected
            generateQRCode();
          }

          // Clear displays
          document.getElementById("codeDisplay").innerHTML = "AWAITING_INPUT...";
          document.getElementById("qrDisplay").style.display = "none";
          document.getElementById("codeDisplay").style.display = "flex";
        });
      });

      async function generateQRCode() {
        const codeDisplay = document.getElementById("codeDisplay");
        const qrDisplay = document.getElementById("qrDisplay");
        const loadingSpinner = document.getElementById("loading");

        loadingSpinner.style.display = "block";
        codeDisplay.innerHTML = "";
        qrDisplay.style.display = "none";

        try {
          const response = await axios("/qr");

          if (response.data.qr) {
            document.getElementById("qrImage").src = response.data.qr;
            document.getElementById("qrInstructions").innerHTML =
              response.data.instructions.join("<br>");
            qrDisplay.style.display = "block";
            codeDisplay.style.display = "none";
          } else {
            codeDisplay.innerHTML =
              '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> SYS_ERROR: QR_FAIL</div>';
            codeDisplay.style.display = "flex";
          }
        } catch (error) {
          console.error("Error generating QR code:", error);
          codeDisplay.innerHTML =
            '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> NETWORK_ERR: TRY_AGAIN</div>';
          codeDisplay.style.display = "flex";
        } finally {
          loadingSpinner.style.display = "none";
        }
      }

      document.getElementById("submit").addEventListener("click", async (e) => {
        e.preventDefault();

        const mobileNumberInput = document.getElementById("mobileNumber");
        const codeDisplay = document.getElementById("codeDisplay");
        const qrDisplay = document.getElementById("qrDisplay");
        const loadingSpinner = document.getElementById("loading");

        const mobileNumber = mobileNumberInput.value.trim();
        if (!mobileNumber) {
          codeDisplay.innerHTML =
            '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> REQ: ENTER_NUMBER</div>';
          return;
        }

        loadingSpinner.style.display = "block";
        codeDisplay.innerHTML = "";
        qrDisplay.style.display = "none";

        try {
          const response = await axios(
            `/pair?number=${mobileNumber.replace(/[^0-9]/g, "")}`,
          );

          const code = response.data.code || "Service Unavailable";
          if (code === "Service Unavailable") {
            codeDisplay.innerHTML =
              '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> SYS_OFFLINE</div>';
          } else {
            codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-square"></i> CODE: ${code}</div>`;
          }
          codeDisplay.style.display = "flex";
        } catch (error) {
          console.error("Error generating code:", error);
          codeDisplay.innerHTML =
            '<div class="error-message"><i class="fas fa-exclamation-triangle"></i> EXEC_FAIL: TRY_AGAIN</div>';
          codeDisplay.style.display = "flex";
        } finally {
          loadingSpinner.style.display = "none";
        }
      });

      function copyCode() {
        const codeDisplay = document.getElementById("codeDisplay").innerText;
        const code = codeDisplay.replace("CODE: ", "");
        navigator.clipboard
          .writeText(code)
          .then(() => {
            const copyBtn = document.getElementById("copy");
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check-double"></i> DATA_COPIED';
            copyBtn.style.color = "var(--navy-dark)";
            copyBtn.style.background = "var(--neon-red)";
            setTimeout(() => {
              copyBtn.innerHTML = originalText;
              copyBtn.style.color = "";
              copyBtn.style.background = "";
            }, 2000);
          })
          .catch((err) => {
            console.error("Failed to copy text: ", err);
          });
      }
    </script>
  </body>
</html>
